<!DOCTYPE html>
<html lang="FR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>acceuil</title>
        <link rel="stylesheet" href="/frontend/css/Style.css" />
    </head>


    <nav class="nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/register">Register</a></li>
        </ul>
    </nav>


    <body>
        <h1>Welcome to the Home Page</h1>
        <button onclick="showPostCreationForm()">Create a Post</button>
        
        <div class="posts" id="posts">
            <div class="popup-content">
                <h2>Create a Post</h2>
                <form id="postForm" onsubmit="createPost(event)">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required><br><br>
                    
                    <label for="content">Content:</label><br>
                    <textarea id="content" name="content" rows="4" cols="50"></textarea><br><br>
                    
                    <label for="imageInput">Upload an image:</label>
                    <input type="file" id="image_url" name="image"><br><br>

                    
                    <button type="submit">Publish</button>
                </form>
                <button onclick="closePopup()">exit</button>
            </div>
        </div>
        <div id="postContainer">
            <div id="post" class="post">
                
            </div>
        </div>

        <div class="create-commente-pop" id="create-commente-pop">
            <div id="commente-pop-up">
                <h2>Create a Commente</h2>
                <form id="commenteForm" onsubmit="createCommente(event)">
                    <input type="hidden" id="post-id-commente" name="post_id">
                    <label for="content-commente">Content:</label><br>
                    <textarea id="content-commente" name="content" rows="4" cols="50"></textarea><br><br>
                    <button type="submit">Publish</button>
                </form>
            </div>
        </div>
        
        <script src="../js/post.js"></script>
    </body>
</html>
