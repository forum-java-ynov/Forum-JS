<!DOCTYPE html>
<html lang="FR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="/frontend/css/Style.css" />
</head>

<body>
<nav class="nav">
    <ul>
        <li><a href="/">Home</a></li>
        <li id="nav-login"><a href="/login">Login</a></li>
        <li id="nav-register"><a href="/register">Register</a></li>
        <li id="nav-user" class="nav-user-hidden">
            <img id="nav-pfp" src="" alt="pfp" class="nav-pfp">
            <span id="nav-email"></span>
        </li>
        <li id="nav-logout" class="nav-user-hidden">
            <a href="/auth/logout">Déconnexion</a>
        </li>
    </ul>
</nav>

<h1>Welcome to the Home Page</h1>

<a href="/auth/google/login">
    <button>Se connecter avec Google</button>
</a>

<button onclick="showPostCreationForm()">Create a Post</button>

<div class="posts" id="posts">
    <div class="popup-content">
        <h2>Create a Post</h2>
        <form id="postForm" onsubmit="createPost(event)">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required><br><br>

            <label for="content">Content:</label><br>
            <textarea id="content" name="content" rows="4" cols="50"></textarea><br><br>

            <label for="imageInput">Upload an image:</label>
            <input type="file" id="image_url" name="image"><br><br>

            <button type="submit">Publish</button>
        </form>
    </div>
</div>

<div id="postContainer"></div>

<script src="/js/oauth.js"></script>
<script src="/js/post.js"></script>
</body>
</html>
