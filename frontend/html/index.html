<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>

    <link rel="stylesheet" href="/frontend/css/Style.css" />
</head>

<body>

<nav>
    <ul>
        <li><a href="/">Home</a></li>

        <div class="nav-divider"></div>

        <li id="nav-login"><a href="/login">Login</a></li>
        <li id="nav-register"><a href="/register">Register</a></li>

        <li id="nav-user" class="nav-user nav-user-hidden">
            <img id="nav-pfp" src="" class="nav-pfp" alt="">
            <span id="nav-name"></span>
        </li>

        <div class="nav-divider"></div>

        <li id="nav-logout" class="nav-user-hidden">
            <a href="/auth/logout">Déconnexion</a>
        </li>

    </ul>
</nav>

<main>

    <section class="hero">
        <p class="hero-eyebrow">Bienvenue</p>

        <h1>
            Partagez ce<br>
            qui compte.
        </h1>

        <p class="hero-sub">
            Un espace pour vos idées, vos photos, votre monde.
        </p>

        <div class="hero-actions">
            <a href="/auth/google/login" class="google-btn">
                Se connecter avec Google
            </a>

            <button class="btn-secondary" onclick="showPostCreationForm()">
                ✦ Créer un post
            </button>
        </div>
    </section>

    <section class="section">
        <p class="section-title">Publications</p>
        <p class="section-sub">Les dernières histoires de la communauté</p>

        <div id="postContainer">
            <div id="post"></div>
        </div>
    </section>

</main>

<!-- post -->
<div class="comment-overlay" id="posts">
    <div class="comment-modal">

        <h2>Nouveau post</h2>

        <form id="postForm" onsubmit="createPost(event)">
            <div class="field">
                <label for="title">Titre</label>
                <input type="text" id="title" required>
            </div>

            <div class="field">
                <label for="content">Contenu</label>
                <textarea id="content" rows="4"></textarea>
            </div>

            <div class="field">
                <label class="file-label">
                    Choisir une image
                    <input type="file" id="image_url" accept="image/*">
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-close-sm" onclick="closePopup()">Annuler</button>
                <button type="submit" class="btn-submit">Publier</button>
            </div>
        </form>

    </div>
</div>

<!-- commennt -->
<div class="comment-overlay" id="create-commente-pop">
    <div class="comment-modal">

        <h2>Commentaire</h2>

        <form id="commenteForm" onsubmit="createCommente(event)">
            <input type="hidden" id="post-id-commente">

            <div class="field">
                <textarea id="content-commente" rows="5"></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-close-sm"
                        onclick="closeCommentPopup()">
                    Annuler
                </button>

                <button type="submit" class="btn-submit">
                    Publier
                </button>
            </div>
        </form>

    </div>
</div>

<script src="/frontend/js/oauth.js"></script>
<script src="/frontend/js/post.js"></script>

</body>
</html>
