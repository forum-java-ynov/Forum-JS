<!DOCTYPE html>
<html lang="FR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/css/index.css">
        <title>acceuil</title>
    </head>
    <body>
        <h1>Welcome to the Home Page</h1>
        <button onclick="window.location.href='/register'">Register</button>
        <button onclick="window.location.href='/login'">Login</button>
        <button onclick="showPostCreationForm()">Create a Post</button>
        
        <div class="posts" id="posts">
            <div class="popup-content">
                <h2>Create a Post</h2>
                <form id="postForm" onsubmit="createPost(event)">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required><br><br>
                    
                    <label for="content">Content:</label><br>
                    <textarea id="content" name="content" rows="4" cols="50"></textarea><br><br>
                    
                    <label for="imageInput">Upload an image:</label>
                    <input type="file" id="image_url" name="image"><br><br>

                    <button type="submit">Publish</button>
                </form>
            </div>
        </div>

        <script src="../js/poste.js"></script>
    </body>
</html>
